<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart.js Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>📊 Візуалізація Даних (Chart.js)</h1>
        <p>Демонстрація лінійного та кругового графіків на одній сторінці.</p>

        <div class="chart-box">
            <h2>Продажі за Місяцями (Лінійний)</h2>
            <canvas id="lineChart"></canvas>
        </div>

        <div class="chart-box">
            <h2>Розподіл Бюджету (Круговий)</h2>
            <canvas id="pieChart"></canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
